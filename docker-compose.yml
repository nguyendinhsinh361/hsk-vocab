# DEV local: chỉ chạy Redis (cache) bằng docker.
# MySQL 8.0 dùng instance NGOÀI (không docker). Deploy production do team system đảm nhận.
services:
  redis:
    image: redis:7-alpine
    container_name: migii-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
